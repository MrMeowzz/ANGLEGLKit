name: Build ANGLEGLKit

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        shell: bash
        run: |
          brew install ldid

      - name: Clone Theos
        shell: bash
        run: |
          rm -rf theos
          git clone --recursive https://github.com/theos/theos.git theos

      - name: Install Theos SDKs
        shell: bash
        run: |
          mkdir -p theos/sdks
          curl -fsSL https://github.com/theos/sdks/tarball/master | tar -xz -C theos/sdks --strip-components=1
          ls theos/sdks

      - name: Build ANGLEGLKit
        shell: bash
        run: |
          make clean || true
          make

      - name: Package framework artifact
        shell: bash
        run: |
          rm -rf build
          mkdir -p build

          cp -R .theos/obj/ANGLEGLKit.framework build/ANGLEGLKit.framework

          codesign --force --sign - --timestamp=none build/ANGLEGLKit.framework/ANGLEGLKit || true

          echo "Built files:"
          find build -maxdepth 4 -type f -print

      - name: Upload ANGLEGLKit.framework
        uses: actions/upload-artifact@v4
        with:
          name: ANGLEGLKit-framework
          path: build/ANGLEGLKit.framework
